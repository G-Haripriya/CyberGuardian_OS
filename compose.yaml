services:
  backend:
    build:
      context: .
    ports:
      - "8000:8000"
    working_dir: /app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app

  frontend:
    build:
      context: .
    ports:
      - "8501:8501"
    working_dir: /app
    command: python -m streamlit run src/interface/app.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      - backend
    volumes:
      - .:/app
